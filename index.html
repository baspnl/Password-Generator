
<!DOCTYPE html>
<html lang=en>
<head>
<style>

/* 🎨 THEME */
:root {
    --bg: #0b0f1a;
    --card: #121a2b;
    --text: #e6f0ff;
    --accent: #1e90ff;
}

body.light {
    --bg: #f4f8ff;
    --card: #ffffff;
    --text: #222;
}

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Card */
.container {
    background: var(--card);
    padding: 25px;
    border-radius: 15px;
    width: 360px;
    box-shadow: 0 0 25px rgba(30,144,255,0.3);
}

h1 {
    font-size: 20px;
    text-align: center;
    margin-bottom: 15px;
}

/* Toggle */
.toggle {
    text-align: right;
    cursor: pointer;
    font-size: 13px;
}

/* Output */
.output {
    display: flex;
    margin: 15px 0;
}

.output input {
    flex: 1;
    padding: 10px;
    border-radius: 8px 0 0 8px;
    border: none;
    background: #0b0f1a;
    color: white;
}

.output button {
    background: var(--accent);
    border: none;
    padding: 10px;
    cursor: pointer;
}

/* Options */
.options label {
    display: flex;
    justify-content: space-between;
    margin: 8px 0;
}

/* Button */
.generate {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(90deg, #1e90ff, #0066ff);
    color: white;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}

.generate:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px #1e90ff;
}

/* Strength */
.strength {
    height: 8px;
    border-radius: 5px;
    background: #333;
    margin: 10px 0;
}

.strength-bar {
    height: 100%;
    width: 0%;
}

/* History */
.history {
    margin-top: 15px;
    font-size: 12px;
    max-height: 100px;
    overflow-y: auto;
}

/* Ad box */
.ad-box {
    margin-top: 15px;
    text-align: center;
}

<meta name=keywords content="password generator, strong password, secure password, random password tool">

</head>
<body>
<div class=container>
<div class=toggle onclick="toggleTheme()">🌙 Toggle</div>
<h1>🔐 Password Generator</h1>
<div class=output>
<input type=text id=password readonly>
<button onclick="copyPassword()">📋</button>
</div>
<div class=strength><div class=strength-bar id=strengthBar></div></div>
<label>Length: <span id=lenVal>12</span></label>
<input type=range id=length min=6 max=32 value=12>
<div class=options>
<label>Uppercase <input type=checkbox id=upper checked></label>
<label>Lowercase <input type=checkbox id=lower checked></label>
<label>Numbers <input type=checkbox id=number checked></label>
<label>Symbols <input type=checkbox id=symbol></label>
</div>
<button class=generate onclick="generatePassword()">Generate Password</button>
<div class=history id=history></div>
<div class=ad-box>
<ins class=adsbygoogle style=display:block data-ad-client=ca-pub-XXXXXXXXXXXX data-ad-slot=1234567890 data-ad-format=auto></ins>
</div>
</div>
<script>

const upperSet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
const lowerSet = "abcdefghijklmnopqrstuvwxyz";
const numberSet = "0123456789";
const symbolSet = "!@#$%^&*()_+";

const lengthSlider = document.getElementById("length");
const lenVal = document.getElementById("lenVal");

lengthSlider.oninput = () => lenVal.textContent = lengthSlider.value;

function generatePassword() {
    let length = lengthSlider.value;
    let chars = "";

    if (upper.checked) chars += upperSet;
    if (lower.checked) chars += lowerSet;
    if (number.checked) chars += numberSet;
    if (symbol.checked) chars += symbolSet;

    if (!chars) return alert("Select options");

    let pass = "";
    for (let i = 0; i < length; i++) {
        pass += chars[Math.floor(Math.random() * chars.length)];
    }

    password.value = pass;
    updateStrength(pass);
    saveHistory(pass);
}

function copyPassword() {
    password.select();
    document.execCommand("copy");
    alert("Copied!");
}

function updateStrength(p) {
    let s = 0;
    if (p.length > 8) s++;
    if (/[A-Z]/.test(p)) s++;
    if (/[0-9]/.test(p)) s++;
    if (/[^A-Za-z0-9]/.test(p)) s++;

    let bar = document.getElementById("strengthBar");
    let colors = ["red","orange","yellow","lime"];

    bar.style.width = (s*25)+"%";
    bar.style.background = colors[s-1] || "red";
}

function toggleTheme() {
    document.body.classList.toggle("light");
}

function saveHistory(p) {
    let div = document.createElement("div");
    div.textContent = p;
    history.prepend(div);

    if (history.childElementCount > 5)
        history.removeChild(history.lastChild);
}

// Load Ads
(adsbygoogle = window.adsbygoogle || []).push({});

</script>
</body>
